# AeroSpace config - adapted for Scandinavian keyboard with Hyper key (Caps Lock via Raycast)
# Hyper = ctrl+alt+cmd+shift

config-version = 2

after-startup-command = []
start-at-login = false

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

on-mode-changed = []

[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.1password.1password' 
    run = 'layout floating'

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 6
    inner.vertical =   6
    outer.left =       6
    outer.bottom =     6
    outer.top =        6
    outer.right =      6

# Main binding mode
# All bindings use hyper (ctrl+alt+cmd+shift) as modifier
# Note: key names refer to physical US QWERTY positions
#   semicolon = ø/ö key, quote = æ/ä key, slash = - key, minus = + key, equal = ´ key
[mode.main.binding]

    # Layout
    ctrl-alt-cmd-shift-slash = 'layout tiles horizontal vertical'
    ctrl-alt-cmd-shift-comma = 'layout accordion horizontal vertical'

    # Focus (vim-style)
    ctrl-alt-cmd-shift-h = 'focus left'
    ctrl-alt-cmd-shift-j = 'focus down'
    ctrl-alt-cmd-shift-k = 'focus up'
    ctrl-alt-cmd-shift-l = 'focus right'

    # Resize
    ctrl-alt-cmd-shift-minus = 'resize smart -50'
    ctrl-alt-cmd-shift-equal = 'resize smart +50'

    # Workspaces
    ctrl-alt-cmd-shift-1 = 'workspace 1'
    ctrl-alt-cmd-shift-2 = 'workspace 2'
    ctrl-alt-cmd-shift-3 = 'workspace 3'
    ctrl-alt-cmd-shift-4 = 'workspace 4'
    ctrl-alt-cmd-shift-5 = 'workspace 5'
    ctrl-alt-cmd-shift-6 = 'workspace 6'
    ctrl-alt-cmd-shift-7 = 'workspace 7'
    ctrl-alt-cmd-shift-8 = 'workspace 8'
    ctrl-alt-cmd-shift-9 = 'workspace 9'

    # Workspace back-and-forth
    ctrl-alt-cmd-shift-tab = 'workspace-back-and-forth'

    # fullscreen
    ctrl-alt-cmd-shift-f = 'fullscreen'

    # Enter move mode (hyper+m) to move windows/nodes
    ctrl-alt-cmd-shift-m = 'mode move'

    # Enter service mode (hyper+semicolon, i.e. hyper+ø/ö on Scandinavian keyboard)
    ctrl-alt-cmd-shift-semicolon = 'mode service'

# Move mode - press hyper+m to enter, then a single key to act
# Automatically returns to main mode after each action
[mode.move.binding]
    # Move window in direction
    h = ['move left', 'mode main']
    j = ['move down', 'mode main']
    k = ['move up', 'mode main']
    l = ['move right', 'mode main']

    # Move window to workspace and follow it
    1 = ['move-node-to-workspace 1', 'workspace 1', 'mode main']
    2 = ['move-node-to-workspace 2', 'workspace 2', 'mode main']
    3 = ['move-node-to-workspace 3', 'workspace 3', 'mode main']
    4 = ['move-node-to-workspace 4', 'workspace 4', 'mode main']
    5 = ['move-node-to-workspace 5', 'workspace 5', 'mode main']
    6 = ['move-node-to-workspace 6', 'workspace 6', 'mode main']
    7 = ['move-node-to-workspace 7', 'workspace 7', 'mode main']
    8 = ['move-node-to-workspace 8', 'workspace 8', 'mode main']
    9 = ['move-node-to-workspace 9', 'workspace 9', 'mode main']

    # Move workspace to next monitor
    tab = ['move-workspace-to-monitor --wrap-around next', 'mode main']

    # Cancel
    esc = 'mode main'

# Service mode - press hyper+semicolon to enter
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # toggle floating/tiling
    backspace = ['close-all-windows-but-current', 'mode main']

    # Join with direction
    h = ['join-with left', 'mode main']
    j = ['join-with down', 'mode main']
    k = ['join-with up', 'mode main']
    l = ['join-with right', 'mode main']
